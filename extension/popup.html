<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header svg { color: #7ab5b0; }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .status {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #4ade80; }
    .status-text { color: #999; }
    .workstream-box {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .workstream-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 6px;
    }
    .workstream-goal {
      font-size: 13px;
      line-height: 1.4;
      color: #e0e0e0;
      font-weight: 500;
    }
    .workstream-state {
      font-size: 12px;
      line-height: 1.4;
      color: #999;
      margin-top: 4px;
    }
    .workstream-meta {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      font-size: 11px;
      color: #666;
    }
    .workstream-meta span {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .workstream-empty {
      font-size: 12px;
      color: #555;
      font-style: italic;
    }
    .context-box {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .context-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 6px;
    }
    .context-text {
      font-size: 12px;
      line-height: 1.5;
      color: #bbb;
      white-space: pre-wrap;
      max-height: 140px;
      overflow-y: auto;
    }
    .context-text.empty {
      color: #555;
      font-style: italic;
    }
    .actions {
      padding: 12px 16px;
    }
    .btn {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }
    .btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn + .btn { margin-top: 6px; }
    .btn-primary {
      background: rgba(122, 181, 176, 0.15);
      border-color: rgba(122, 181, 176, 0.3);
      color: #7ab5b0;
    }
    .btn-primary:hover {
      background: rgba(122, 181, 176, 0.25);
    }
    .hint {
      padding: 10px 16px;
      font-size: 11px;
      color: #555;
      text-align: center;
    }
    .hint code {
      background: rgba(255,255,255,0.06);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    <h1>lurk</h1>
  </div>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking...</span>
  </div>

  <div class="workstream-box" id="workstreamBox" style="display:none">
    <div class="workstream-label">Active workstream</div>
    <div class="workstream-goal" id="workstreamGoal"></div>
    <div class="workstream-state" id="workstreamState"></div>
    <div class="workstream-meta" id="workstreamMeta"></div>
  </div>

  <div class="context-box">
    <div class="context-label">Context preview</div>
    <div class="context-text empty" id="contextText">Loading...</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="copyBtn" disabled>Copy context to clipboard</button>
    <button class="btn" id="injectBtn" disabled>Inject into active chat</button>
  </div>

  <div class="hint" id="hint"></div>

  <script src="popup.js"></script>
</body>
</html>
